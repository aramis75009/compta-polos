<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Plus+Jakarta+Sans:wght@400;500;600&family=Space+Mono&display=swap" rel="stylesheet">
<style>
  body { margin:0; font-family:'Plus Jakarta Sans',sans-serif; }
  @keyframes atlas-draw {
    0%   { stroke-dashoffset:100; }
    42%  { stroke-dashoffset:0; }
    58%  { stroke-dashoffset:0; }
    100% { stroke-dashoffset:-100; }
  }
  @keyframes atlas-breathe {
    0%,100% { transform:scale(1);   opacity:1;   }
    50%     { transform:scale(1.03);opacity:.92; }
  }
  @keyframes atlas-sweep {
    0%   { transform:translateX(-64px); }
    100% { transform:translateX(160px); }
  }
  @keyframes atlas-comet {
    from { stroke-dashoffset:100; }
    to   { stroke-dashoffset:0;   }
  }
  @keyframes atlas-pulsefade {
    0%,100% { opacity:.35; }
    50%     { opacity:.7;  }
  }
  @keyframes atlas-rowshimmer {
    0%   { background-position:-220px 0; }
    100% { background-position:340px 0;  }
  }
  @keyframes atlas-dots {
    0%,20%  { opacity:.2; }
    50%     { opacity:1;  }
    80%,100%{ opacity:.2; }
  }
</style>
</helmet>
